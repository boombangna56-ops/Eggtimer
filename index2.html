<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egg Timer ของพี่มี่คนสวย 🧡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Anuphan', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s ease-out forwards; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col items-center">

    <header class="w-full max-w-md text-center pt-8 pb-4 px-4">
        <h1 class="text-2xl sm:text-3xl font-bold text-orange-600 flex flex-col items-center justify-center gap-1">
            <div class="flex items-center gap-2">
                <svg viewBox="0 0 24 24" class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4M12 14v-4M4 13a8 8 0 0 1 8-7 8 8 0 1 1-5.3 14L4 17.6M9 17l1 1M14 17l-1 1"/></svg>
                <span>Egg Timer</span>
            </div>
            <span class="text-lg sm:text-xl text-orange-500 font-medium flex items-center gap-1">
                ของพี่มี่คนสวย 🧡
            </span>
        </h1>
    </header>

    <main class="w-full max-w-md px-4 pb-20">
        <div id="main-card" class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-stone-100 transition-colors duration-500">
            <!-- Visual Display -->
            <div id="display-section" class="p-8 flex flex-col items-center transition-colors duration-500">
                <div class="relative w-48 h-48 sm:w-56 sm:h-56 flex items-center justify-center">
                    <svg class="absolute w-full h-full -rotate-90" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="80" fill="transparent" stroke="white" stroke-width="8" class="opacity-30" />
                        <circle id="progress-bar" cx="100" cy="100" r="80" fill="transparent" stroke="currentColor" stroke-width="8" stroke-dasharray="502.6" stroke-dashoffset="502.6" class="timer-circle" stroke-linecap="round" />
                    </svg>
                    
                    <div class="flex flex-col items-center z-10">
                        <div id="egg-visual" class="w-16 h-20 sm:w-20 sm:h-24 rounded-full border-4 border-white bg-white relative shadow-md flex items-center justify-center transition-all">
                            <div id="yolk-visual" class="absolute bottom-3 w-10 h-10 sm:w-12 sm:h-12 rounded-full blur-md opacity-60"></div>
                            <svg viewBox="0 0 24 24" class="w-10 h-10 sm:w-14 sm:h-14 opacity-20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22a8 8 0 0 0 8-8c0-4.418-3.582-12-8-12S4 9.582 4 14a8 8 0 0 0 8 8z"/></svg>
                        </div>
                        <div id="timer-text" class="text-4xl sm:text-5xl font-mono font-black mt-4 tabular-nums text-slate-800">04:00</div>
                    </div>
                </div>

                <div class="mt-8 flex gap-4 w-full justify-center">
                    <button id="btn-start" class="flex-1 max-w-[140px] flex items-center justify-center gap-2 bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                        <svg viewBox="0 0 24 24" class="w-5 h-5" fill="currentColor"><path d="m5 3 14 9-14 9V3z"/></svg>
                        <span>เริ่มต้ม</span>
                    </button>
                    <button id="btn-pause" class="hidden flex-1 max-w-[140px] flex items-center justify-center gap-2 bg-white text-slate-900 py-4 rounded-2xl font-bold shadow-md active:scale-95 border border-slate-100 transition-all">
                        <svg viewBox="0 0 24 24" class="w-5 h-5" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h4z"/></svg>
                        <span>พักก่อน</span>
                    </button>
                    <button id="btn-reset" class="w-14 h-14 flex items-center justify-center bg-white text-slate-400 rounded-2xl shadow-md border border-slate-50 active:rotate-180 transition-transform duration-500">
                        <svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/></svg>
                    </button>
                </div>
            </div>

            <!-- Selection Options -->
            <div class="p-6">
                <div class="flex items-center gap-2 mb-4 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                    <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.254 1.216-3.156C7.302 11.391 7.749 12.29 8 13c.25.71.5 1.5.5 1.5z"/></svg>
                    เลือกความสุกที่ต้องการ
                </div>
                <div id="egg-options" class="grid grid-cols-1 gap-2.5">
                    <!-- Options will be generated here -->
                </div>
            </div>
        </div>

        <div class="mt-6 p-4 bg-orange-50 rounded-2xl border border-orange-100 flex gap-3">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-orange-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            <p class="text-[11px] text-orange-800 leading-relaxed">
                <strong>Tip:</strong> ต้มเสร็จแล้วอย่าลืมแช่น้ำเย็นทันทีเพื่อให้ปอกง่ายและหยุดความร้อนนะครับ 🧡
            </p>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-xs w-full text-center shadow-2xl border-4 border-orange-400 animate-pop">
            <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                <svg viewBox="0 0 24 24" class="w-10 h-10 animate-bounce" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-1">เสร็จแล้วค่ะ!</h2>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed">
                ระดับ <span id="finish-egg-name" class="font-bold text-orange-600"></span><br/>ของพี่มี่คนสวยพร้อมทานแล้ว 🧡
            </p>
            <button id="btn-close-modal" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">รับทราบค่ะ!</button>
        </div>
    </div>

    <footer class="mt-auto py-6 text-slate-300 text-[10px] tracking-widest uppercase">
        &copy; 2024 Egg Timer ของพี่มี่คนสวย
    </footer>

    <script>
        const EGG_TYPES = [
            { id: 'soft-2', name: 'ไข่ลวก (2 นาที)', description: 'ไข่ขาวเป็นวุ้น ไข่แดงเป็นน้ำ', time: 2, color: 'bg-yellow-50', textClass: 'text-yellow-700', yolk: 'bg-yellow-300', border: 'border-yellow-300' },
            { id: 'creamy-4', name: 'ยางมะตูม (4 นาที)', description: 'ไข่ขาวสุกพอประมาณ ไข่แดงเยิ้ม', time: 4, color: 'bg-orange-50', textClass: 'text-orange-700', yolk: 'bg-orange-400', border: 'border-orange-300' },
            { id: 'medium-6', name: 'เกือบสุก (6 นาที)', description: 'ไข่ขาวสุก ไข่แดงเริ่มเซ็ตตัว', time: 6, color: 'bg-orange-100', textClass: 'text-orange-800', yolk: 'bg-orange-500', border: 'border-orange-400' },
            { id: 'hard-8', name: 'สุกพอดี (8 นาที)', description: 'ไข่ขาวสุกเต็มที่ ไข่แดงสุกสีสวย', time: 8, color: 'bg-amber-50', textClass: 'text-amber-900', yolk: 'bg-amber-600', border: 'border-amber-500' },
            { id: 'very-hard-10', name: 'สุกมาก (10 นาที)', description: 'สุกเต็มใบทั้งขาวและแดง', time: 10, color: 'bg-stone-100', textClass: 'text-stone-800', yolk: 'bg-stone-500', border: 'border-stone-400' }
        ];

        let currentEgg = EGG_TYPES[1];
        let timeLeft = currentEgg.time * 60;
        let isRunning = false;
        let timerId = null;
        const circleTotal = 502.6;

        // Elements
        const timerText = document.getElementById('timer-text');
        const progressBar = document.getElementById('progress-bar');
        const displaySection = document.getElementById('display-section');
        const eggVisual = document.getElementById('egg-visual');
        const yolkVisual = document.getElementById('yolk-visual');
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');
        const optionsGrid = document.getElementById('egg-options');
        const modal = document.getElementById('modal');
        const finishName = document.getElementById('finish-egg-name');

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function updateUI() {
            timerText.innerText = formatTime(timeLeft);
            const total = currentEgg.time * 60;
            const progress = ((total - timeLeft) / total);
            progressBar.style.strokeDashoffset = circleTotal - (progress * circleTotal);
            
            // Background & Colors
            displaySection.className = `p-8 flex flex-col items-center transition-colors duration-500 ${currentEgg.color}`;
            progressBar.className = `timer-circle ${currentEgg.textClass}`;
            yolkVisual.className = `absolute bottom-3 w-10 h-10 sm:w-12 sm:h-12 rounded-full blur-md opacity-60 ${currentEgg.yolk}`;
            eggVisual.className = `w-16 h-20 sm:w-20 sm:h-24 rounded-full border-4 border-white bg-white relative shadow-md flex items-center justify-center transition-all ${isRunning ? 'scale-110 shadow-lg' : 'scale-100'}`;
        }

        function renderOptions() {
            optionsGrid.innerHTML = '';
            EGG_TYPES.forEach(egg => {
                const btn = document.createElement('button');
                const isSelected = currentEgg.id === egg.id;
                btn.className = `w-full p-4 rounded-2xl text-left border-2 flex items-center justify-between transition-all active:scale-[0.98] ${isSelected ? `${egg.border} ${egg.color} border-2 shadow-inner` : 'border-stone-50 hover:bg-stone-50'}`;
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${egg.yolk} bg-opacity-20 shrink-0">
                            <div class="w-3.5 h-3.5 rounded-full ${egg.yolk}"></div>
                        </div>
                        <div>
                            <div class="font-bold text-sm sm:text-base text-slate-800">${egg.name}</div>
                            <div class="text-[11px] text-slate-500">${egg.description}</div>
                        </div>
                    </div>
                    ${isSelected ? `<svg viewBox="0 0 24 24" class="w-5 h-5 ${egg.textClass}" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/></svg>` : ''}
                `;
                btn.onclick = () => {
                    stopTimer();
                    currentEgg = egg;
                    timeLeft = egg.time * 60;
                    renderOptions();
                    updateUI();
                };
                optionsGrid.appendChild(btn);
            });
        }

        function startTimer() {
            if (timeLeft <= 0) return;
            isRunning = true;
            btnStart.classList.add('hidden');
            btnPause.classList.remove('hidden');
            updateUI();
            
            timerId = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    finishTimer();
                }
                updateUI();
            }, 1000);

            if (navigator.wakeLock) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerId);
            btnStart.classList.remove('hidden');
            btnPause.classList.add('hidden');
            updateUI();
        }

        function finishTimer() {
            stopTimer();
            modal.classList.remove('hidden');
            finishName.innerText = currentEgg.name;
            if (navigator.vibrate) try { navigator.vibrate([500, 200, 500]); } catch(e){}
        }

        btnStart.onclick = startTimer;
        btnPause.onclick = stopTimer;
        btnReset.onclick = () => {
            stopTimer();
            timeLeft = currentEgg.time * 60;
            updateUI();
        };
        document.getElementById('btn-close-modal').onclick = () => {
            modal.classList.add('hidden');
            timeLeft = currentEgg.time * 60;
            updateUI();
        };

        // Init
        renderOptions();
        updateUI();
    </script>
</body>
</html>
